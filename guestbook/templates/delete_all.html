{% extends "base.html" %}

{% block title %}Подтверждение удаления{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">⚠️ Внимание!</h4>
            </div>
            <div class="card-body">
                <p class="lead">Вы действительно хотите удалить все сообщения?</p>
                <p class="text-muted">Это действие нельзя будет отменить.</p>
                <form method="POST" action="/delete-all-confirm">
                    <button type="submit" class="btn btn-danger btn-lg">Да, удалить всё</button>
                    <a href="/" class="btn btn-secondary btn-lg">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
